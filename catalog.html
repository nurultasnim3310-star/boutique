<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATALOG</title>

   <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        
        }

        body{

            background: #f5f5f5;

        }

        /* HEADER */

        header{

            background: black;

            color: white;

            text-align: center;

            padding: 20px;

        }

        nav{

            margin-top: 10px;

        }

        nav a{

            color: white;

            text-decoration: none;

            margin: 0 15px;

        }

        /* BANNER */

        .banner{

            text-align: center;

            padding: 80px 20px;

            background: pink;

        }

        .banner h2{

            font-size: 40px;

            margin-bottom: 10px;

        }

        .banner button{

            margin-top: 20px;

            padding: 10px 25px;

            border: none;

            background: black;

            color: white;

            cursor: pointer;

        }

        /* WHY SHOP */

        .why{

            text-align: center;

            padding: 50px 20px;

            line-height: 35px;

        }

        /* PRODUCTS */

        .products{

            text-align: center;

            padding: 50px 20px;

        }

        .product h2{
            
            text-align: center;

            margin-bottom: 30px;
        }

        .product-container{

            display: flex;

            justify-content: center;

            gap: 50px;

            margin-top: 30px;

            flex-wrap: wrap;

        }

        .card{

            background: white;

            padding: 15px;

            border-radius: 10px;

        }

        .card img{

            width: 180px;

            height: 220px;

            object-fit: cover;

        }

        .card h3{

            margin-top: 10px;

        }

        .card p{

            margin: 5px 0;

        }

        .card button{

            padding: 8px 20px;

            border: none;

            background: black;

            color: white;

            cursor: pointer;

        }

        /* CONTACT */

        .contact{

            padding: 50px 20px;

            text-align: center;

        }

        form{

            width: 350px;

            margin: auto;

        }

        form input,

        form textarea{

            width: 100%;

            padding: 10px;

            margin-bottom: 15px;

        }

        form textarea{

            height: 100px;

        }

        .btn{

            display: flex;

            gap: 10px;

        }

        .btn button{

            flex: 1;

            padding: 10px;

            border: none;

            background: black;

            color: white;

            cursor: pointer;

        }

        /* FOOTER */

        footer{

            background: black;

            color: white;

            text-align: center;

            padding: 20px;

            margin-top: 40px;
        }

    </style>   
</head>

<body>

    <header>
        <h1>WELCOME TO FANCY.COM</h1>

        <nav>
            <a href="index.html">HOME </a>
            <a href="catalog.html">CATALOG </a>
            <a href="contact.html">CONTACT</a>
        </nav>

    </header>
      

    <section class="products">

        <h2>ALL ITEM</h2>

        <input type="text" placeholder="SEARCH..." class="search">

        <div class="product-container">

            <div class="card">

              <img src="elegant_dress.jpg" alt="" width="400" height="500">

              <h3>Elegant Dress</h3>

              <p>RM120</p>

              <button>Add To Cart</button>

            </div>

        <div class="card">

            <img src="casual_outfit.webp" alt="" width="400" height="500">

            <h3>Casual Outfit</h3>

            <p>RM75</p>
            
            <button>Add To Cart</button>

          </div>

          <div class="card">

              <img src="baju_kurung.jpg" alt="" width="400" height="500">

              <h3>Modern Kurung</h3>

              <p>RM89</p>

              <button>Add To Cart</button>

          </div>

        </div>

    </section>

    <footer>
        <p>012-3456789</p>

        <p>HELLO@FANCY.COM</p>

    </footer>

</body>
</html>
